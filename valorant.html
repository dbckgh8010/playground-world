<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT</title>
    <link rel="icon" type="image/png" href="assets/img/main/game_master_challenge_transparent.png">
    <link rel="stylesheet" href="assets/css/common/common.css">
    <link rel="stylesheet" href="assets/css/sub/valorant.css">
    <link rel="stylesheet" href="assets/css/fonts.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <script src="assets/js/common/common.js"></script>
    <script src="assets/js/sub/valorant.js" defer></script>
</head>
<body>
    <div class="bg">
        <div class="bg__grid"></div>
    </div>
    <header class="header">
        <a href="index.html" class="logo">
            <h1 class="brand-name">
                <img src="assets/img/common/site-logo.png" alt="재밌는 놀이터 사이트 로고">
            </h1>
        </a>
        <button type="button" class="mo-menu"></button>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item" style="--accent: #68f92e;">
                    <a href="index.html" class="nav__item-link">
                        <span class="nav__item-link-dot dot__green"></span>
                        홈 
                    </a>
                </li>
                <li class="nav__item" style="--accent: #fff200;">
                    <a href="battleground.html" class="nav__item-link">
                        <span class="nav__item-link-dot dot__yellow"></span>
                        배틀그라운드
                    </a>
                </li>
                <li class="nav__item" style="--accent: #fb3f50;">
                    <a href="valorant.html" class="nav__item-link">
                        <span class="nav__item-link-dot dot__red"></span>
                        발로란트
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="main">
        <section class="valorant">
            <div class="valorant__header"></div>
            <div class="valorant__main">
                <div class="valorant__role-tab">
                    <button data-role="all">전체</button>
                    <button data-role="duelist">타격대</button>
                    <button data-role="initiaor">척후대</button>
                    <button data-role="controller">전략가</button>
                    <button data-role="sentinel">감시자</button>
                </div>
                <div class="valorant__roulette-box">
                    <ul class="valorant__roulette-list"></ul>
                </div>
                <button class="spin-btn" type="button">START</button>
            </div>
        </section>
    </main>
</body>
</html>
